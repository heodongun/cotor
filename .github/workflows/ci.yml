name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Format check
        run: gradle formatCheck

      - name: Test
        id: test
        run: gradle test

      - name: Reopen and unassign Linear issue on failed PR tests
        if: ${{ failure() && github.event_name == 'pull_request' && steps.test.outcome == 'failure' }}
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: python3 scripts/linear_pr_failure_gate.py --event-path "$GITHUB_EVENT_PATH"
